# кіөнҶө: PostgreSQLл§Ң м •мқҳн•©лӢҲлӢӨ.
# Dev:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Rel:  docker compose -f docker-compose.yml -f docker-compose.release.yml up --build -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: blog-postgres
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
      POSTGRES_DB: blog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blog"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
